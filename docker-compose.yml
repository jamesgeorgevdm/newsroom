services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  web:
    image: jamesgeorgevdm/newsroom:v1
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  db_data: 